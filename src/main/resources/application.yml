server:
  port: 8085

spring:
  application:
    name: url-shortener

  datasource:
    url: jdbc:postgresql://localhost:5432/urlshortener
    username: postgres
    password: 
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update        
    show-sql: true            
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

app:
  base-url: http://localhost:8080   
  jwt:
    secret: VGhpc0lzQVN1cGVyU2VjdXJlSldUU2VjcmV0S2V5Rm9ySFMyNTY=
    expiration-ms: 86400000         # 24 hours in milliseconds
  url:
    default-expiry-days: 30         # URLs expire after 30 days by default
    max-urls-per-user: 50           # Authenticated users can create max 50 URLs
    max-urls-anonymous: 5           # Anonymous users limited to 5
  rate-limit:
    max-requests-per-minute: 10     # Per IP for anonymous users